  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "무대 조명 렌탈 견적은 어떻게 받을 수 있나요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "무대 공작소 홈페이지의 문의 양식을 통해 행사 유형, 규모, 일정을 알려주시면 24시간 이내에 맞춤 견적을 보내드립니다. 전화 문의도 가능합니다: 010-7737-0387. 조명 패키지는 500,000원부터 2,300,000원까지 다양하게 준비되어 있습니다."
        }
      },
      {
        "@type": "Question",
        "name": "어떤 규모의 행사까지 가능한가요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "소규모 버스킹부터 KBS 아레나 규모의 대형 콘서트까지 모든 규모의 행사에 대응 가능합니다. 무대 공작소는 연간 200건 이상의 프로젝트를 수행하며, 9개 전문 팀이 장비와 인력을 행사 규모에 맞게 편성합니다. KBS 아레나, 상암 숲 콜로세움, 마포아트센터 등 대형 공연장 실적이 있습니다."
        }
      },
      {
        "@type": "Question",
        "name": "무대 장비 설치와 철거는 포함인가요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "네, 모든 렌탈 패키지에 설치, 운영, 철거가 포함됩니다. 조명감독, 음향감독 등 전문 스태프가 현장에 상주합니다. 전일 설치가 필요한 경우 추가 비용이 발생할 수 있으며, 학교축제 패키지의 경우 전날 설치 및 리허설 시 60만원이 추가됩니다."
        }
      },
      {
        "@type": "Question",
        "name": "지방 행사도 가능한가요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "네, 전국 어디든 출장 가능합니다. 서울 외 지방 행사의 경우 운송비와 숙박비가 별도로 발생합니다. 부천시민회관, 아트센터 인천 등 수도권 및 지방 공연장에서의 실적이 있습니다."
        }
      },
      {
        "@type": "Question",
        "name": "무대 조명 렌탈 비용은 얼마인가요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "무대 공작소의 조명 렌탈 패키지는 규모에 따라 500,000원(PAR 라이트 8대 기본)부터 2,300,000원(대형 페스티벌 28대 무빙)까지 다양합니다. 소규모 버스킹/행사는 50~80만원대, 중형 콘서트는 100~180만원대, 대형 콘서트/축제는 200만원 이상입니다. 조명감독 상주, 콘솔, 포그머신 등이 포함됩니다."
        }
      },
      {
        "@type": "Question",
        "name": "음향 렌탈 패키지에 무엇이 포함되나요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "무대 공작소의 음향 패키지에는 마이다스 M32R 음향콘솔, 타소 T2 라인어레이 스피커, 젠하이져 무선마이크(6~8개), 무선인이어 모니터, 동축 모니터 스피커, 악기마이크 풀세트, 음향감독 및 보조감독이 포함됩니다. 가격은 300명 커버 80만원부터 1,500명 커버 180만원까지입니다."
        }
      },
      {
        "@type": "Question",
        "name": "학교 축제 무대 패키지가 있나요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "네, 학교축제 전용 패키지가 2종 있습니다. 패키지 A(250만원)는 음향+악기세트+조명 통합 세트로 밴드공연에 최적화되어 있고, 패키지 B(220만원)는 음향+조명 통합 세트입니다. 두 패키지 모두 음향감독, 조명감독, 보조감독이 상주하며 당일 행사 기준입니다."
        }
      },
      {
        "@type": "Question",
        "name": "취소나 일정 변경이 가능한가요?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "행사 14일 전까지 무료 변경/취소가 가능합니다. 7일 전까지는 계약금 환불이 가능하며, 그 이후에는 별도 협의가 필요합니다."
        }
      },
